name: Deploy to PyPI 📦

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_run:
    workflows: ["Building and Testing"]
    branches: [ main ]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to PyPI 📦
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel twine build

      - name: Verify triggering workflow
        if: github.event_name == 'workflow_run'
        run: |
          echo "Triggered by: ${{ github.event.workflow_run.name }}"
          echo "Conclusion: ${{ github.event.workflow_run.conclusion }}"

      - name: Security check before build
        run: |
          pip install pip-audit
          pip-audit --skip-editable
        continue-on-error: true

      - name: Build distribution packages
        run: |
          echo "Building distribution packages..."
          python -m build
          echo "Checking package integrity..."
          twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions-pypi
          path: dist/

      - name: Upload to PyPI
        run: |
          echo "Uploading packages to production PyPI..."
          twine upload dist/* --verbose
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        timeout-minutes: 5

      - name: Wait for PyPI processing
        run: sleep 30s

      - name: Install and verify from PyPI
        run: |
          echo "Installing repo-people from production PyPI..."
          pip install repo-people --upgrade
          echo "Verifying installation..."
          python -c "import repo_people; print('repo-people installed successfully')"
        timeout-minutes: 5
        continue-on-error: true

      - name: Verify package version
        run: |
          INSTALLED_VERSION=$(pip show repo-people | grep Version | cut -d ' ' -f 2)
          echo "Installed version: $INSTALLED_VERSION"
        continue-on-error: true

      - name: Create job summary
        if: always()
        run: |
          echo "## PyPI Production Deployment Summary 📦" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Package**: repo-people" >> $GITHUB_STEP_SUMMARY
          echo "- **Target**: Production PyPI" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "- **Triggered By**: ${{ github.event.workflow_run.name }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Test Conclusion**: ${{ github.event.workflow_run.conclusion }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "dist" ]; then
            echo "**Build Artifacts**: $(ls -1 dist/ | wc -l) files" >> $GITHUB_STEP_SUMMARY
            ls -lh dist/ >> $GITHUB_STEP_SUMMARY
          fi